@if(userDetailedInfo){
<div class="user-card">
  <div class="card-header">
    <img [src]="userDetailedInfo.avatar" alt="User Avatar" class="avatar">
    <h2 class="fullname">{{ userDetailedInfo.fullname }}</h2>
    <p class="email">{{ userDetailedInfo.email }}</p>
  </div>

  <div class="card-body">
    <div class="detail-group">
      <span class="label">Gender</span>
      <span class="value">{{userDetailedInfo.gender ? userDetailedInfo.gender : '-'}}</span>
    </div>

    <div class="detail-group">
      <span class="label">Address</span>
      <span class="value">{{userDetailedInfo.address}}</span>
    </div>
  </div>
  
  <div class="card-footer">
    <button class="btn-edit">Edit Profile</button>
  </div>
</div>
}
